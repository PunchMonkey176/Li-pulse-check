<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Delivery Pulse Check 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6f8;--sf:#ffffff;--sf2:#f0f1f4;--bd:#e2e4ea;--tx:#1a1d2a;--dim:#6b7086;--acc:#2563eb;--grn:#059669;--grn-bg:#ecfdf5;--yel:#d97706;--yel-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--prp:#7c3aed;--shd:0 1px 3px rgba(0,0,0,.06)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:0 16px 40px}
.hdr{padding:18px 0 14px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--bd)}
.hdr h1{font-size:24px;font-weight:300;letter-spacing:-.5px}
.hdr h1 span{color:var(--acc);font-weight:600}
.hdr-r{display:flex;gap:6px;align-items:center}
.wk{font-size:11px;color:var(--dim);background:var(--sf);padding:5px 12px;border-radius:7px;border:1px solid var(--bd);box-shadow:var(--shd)}
.rst{font-size:11px;color:var(--red);background:var(--red-bg);padding:5px 12px;border-radius:7px;border:1px solid #fecaca;cursor:pointer;font-family:inherit}
.rst:hover{background:#fee2e2}
.sync-btn{font-size:11px;color:var(--acc);background:#eff6ff;padding:5px 12px;border-radius:7px;border:1px solid #bfdbfe;cursor:pointer;font-family:inherit}
.sync-btn:hover{background:#dbeafe}
.tabs{display:flex;gap:3px;padding:14px 0 18px;overflow-x:auto}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:400;color:var(--dim);background:transparent;border:none;transition:all .15s;white-space:nowrap;user-select:none;font-family:inherit}
.tab:hover{color:var(--tx);background:var(--sf)}
.tab.on{font-weight:600;color:#fff;background:var(--acc);box-shadow:0 2px 6px rgba(37,99,235,.25)}
.tab.p{border-left:3px solid var(--prp)}
.tab.p.on{border-left-color:#fff}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shd)}
.card.click{cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card.click:hover{border-color:var(--acc);box-shadow:0 2px 8px rgba(37,99,235,.1)}
.ct{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sv{font-size:34px;font-weight:200;letter-spacing:-1px}
.ss{font-size:11px;color:#9ca3af;margin-top:2px}
.hg{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.hi{text-align:center;padding:8px 2px;background:var(--sf2);border-radius:8px}
.hi .l{display:block;font-size:9px;color:var(--dim);margin-bottom:3px}
.hi .v{font-size:22px;font-weight:300}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{width:80px;font-size:11px;color:var(--dim);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:var(--sf2);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff;transition:width .4s}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 8px;color:var(--dim);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);background:var(--sf)}
th.grp-risk{background:#fef2f2;color:var(--red)}
th.grp-sales{background:var(--grn-bg);color:var(--grn)}
td{padding:7px 8px;border-bottom:1px solid var(--sf2);vertical-align:top}
td.grp-risk{background:#fffbfb}
td.grp-sales{background:#f7fdf9}
tr:hover td{background:#f8f9fb}
tr:hover td.grp-risk{background:#fef5f5}
tr:hover td.grp-sales{background:#f0faf4}
.ei{background:transparent;border:1px solid transparent;color:var(--tx);font-family:inherit;font-size:13px;padding:4px 6px;border-radius:6px;width:100%;outline:none;resize:vertical}
.ei:hover{border-color:var(--bd)}
.ei:focus{border-color:var(--acc);background:#f8faff}
.sc-sel{border:1px solid var(--bd);font-weight:700;font-size:13px;padding:4px 2px;border-radius:6px;width:40px;text-align:center;cursor:pointer;outline:none}
.sc-sel:focus{border-color:var(--acc)}
.date-in{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:12px;padding:4px 6px;border-radius:6px;width:125px;outline:none}
.date-in:focus{border-color:var(--acc)}
.add-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px dashed var(--bd);border-radius:8px;color:var(--dim);font-size:12px;cursor:pointer;background:transparent;margin-top:8px;font-family:inherit}
.add-btn:hover{border-color:var(--acc);color:var(--acc);background:#eff6ff}
.del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:2px 4px;font-family:inherit;opacity:.5}
.del-btn:hover{opacity:1}
.rec-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:16px 18px 16px 26px;margin-bottom:10px;position:relative;box-shadow:var(--shd)}
.rec-stripe{position:absolute;left:0;top:0;width:4px;height:100%;border-radius:12px 0 0 12px}
.toast{position:fixed;bottom:14px;right:14px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:100}
.toast.on{opacity:1;transform:translateY(0)}
.toast-save{background:var(--grn);box-shadow:0 4px 12px rgba(5,150,105,.25)}
.toast-sync{background:var(--acc);box-shadow:0 4px 12px rgba(37,99,235,.25)}
.toast-err{background:var(--red);box-shadow:0 4px 12px rgba(220,38,38,.25)}
.hot-item{font-size:11px;color:var(--dim);padding:2px 0}
.hot-dot{color:var(--yel);margin-right:5px}
.legend{font-size:11px;color:var(--dim);display:flex;gap:14px;margin-top:4px}
.legend-dot{display:inline-block;width:22px;height:22px;border-radius:5px;text-align:center;line-height:22px;font-size:11px;font-weight:700;margin-right:4px}
.upd-badge{font-size:10px;color:var(--dim);background:var(--sf2);padding:2px 6px;border-radius:4px}
.alert{border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;font-size:13px}
.alert .alert-icon{font-size:18px;flex-shrink:0;line-height:1}
.alert .alert-body{flex:1}
.alert .alert-title{font-weight:700;margin-bottom:2px}
.alert .alert-sub{font-size:11px;opacity:.8}
.alert-red{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert-orange{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412}
.alert-yellow{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.ctr-bar{height:6px;background:var(--sf2);border-radius:3px;margin-top:4px;overflow:hidden}
.ctr-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.ctr-renew{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;white-space:nowrap;cursor:pointer}
tr.archived td{opacity:.45;background:#f9fafb}
tr.archived:hover td{opacity:.65}
.show-arch{font-size:11px;color:var(--acc);background:none;border:none;cursor:pointer;margin-left:auto;font-family:inherit}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:var(--dim)}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.grid2{grid-template-columns:1fr}.hg{grid-template-columns:repeat(3,1fr)}.hdr{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading"><div class="spinner"></div><div>Loading from Google Sheets...</div></div></div>
<div class="toast toast-save" id="toast-save">✓ Saved to Google Sheets</div>
<div class="toast toast-sync" id="toast-sync">↻ Synced from Google Sheets</div>
<div class="toast toast-err" id="toast-err">⚠ Save failed — retrying...</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw3HVTzSVI2TbS-LF3bjXFdywzykZWnbsRRsSdX_eYoZuOw7uhoXvwvw-vFe9Ky6DrYlA/exec";
const HF=["contracts","financials","delivery","blendTeam","clientSat","engagement"];
const HL=["Contracts","Financials","Delivery","Blend Team","Client Sat","Engagement"];
const PPL=["Ankit","Charlie","Ryan"];
const NUM_FIELDS=["contracts","financials","delivery","blendTeam","clientSat","engagement"];

const DD={people:{
Ankit:{projects:[{id:"a1",name:"LinkedIn MIDA - Datawatch",lp:"Paul",dl:"Ankit Agarwal",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"2026-03-17",hot:"Claude Access is pending",risks:"",mit:"Jenee moving engineers to her org by EOW",mitDue:"",sales:"",notes:""},
{id:"a2",name:"Trust Project Sanket",lp:"Sanket",dl:"Ankit Agarwal",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"2026-03-17",hot:"Bangalore office incident",risks:"",mit:"",mitDue:"",sales:"AI Workshop planned for March 17",notes:""}]},
Charlie:{projects:[{id:"c1",name:"LinkedIn CGI FY26 CO2",lp:"Leo Pedraza/Mimi",dl:"Charlie Gage",contracts:2,financials:3,delivery:3,blendTeam:2,clientSat:3,engagement:2,upd:"2026-03-17",hot:"Renewal time",risks:"Adithya is on an island",mit:"",mitDue:"",sales:"",notes:"Need to check on renewal"},
{id:"c2",name:"LTS BI FY2025Q1 (Ileana) CO7",lp:"Ileana",dl:"Charlie Gage/David Salcedo",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"",hot:"",risks:"",mit:"",mitDue:"",sales:"",notes:"Need to TB with David S"},
{id:"c3",name:"LinkedIn MIDA - Targeting",lp:"Rajni/Irene",dl:"Charlie Gage/Yugdeep",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"",hot:"",risks:"",mit:"",mitDue:"",sales:"",notes:""},
{id:"c4",name:"LinkedIn MIDA - Datavision",lp:"Laura/Marco",dl:"Charlie/Yugdeep/Eric",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"2026-03-17",hot:"",risks:"",mit:"",mitDue:"",sales:"",notes:""}]},
Ryan:{projects:[{id:"r1",name:"LinkedIn MIDA - Measurement",lp:"Zaid/Erica",dl:"Ryan Ottino",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"2026-03-17",hot:"Updating prioritizations for FY27",risks:"SEO data sent to AP was incomplete",mit:"Analyzing impact",mitDue:"",sales:"In-housing MMM",notes:""},
{id:"r2",name:"LTV Work",lp:"Licurgo",dl:"David Salcedo",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"2026-03-17",hot:"Bug found in NN build",risks:"",mit:"Zaid and Paolo rescoping project",mitDue:"",sales:"CRM lifecycle workshop",notes:""},
{id:"r3",name:"Incremental Testing",lp:"Faye",dl:"Ryan Ottino",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:"",hot:"",risks:"",mit:"",mitDue:"",sales:"",notes:""}]}
},
riskTracker:[{id:"rk1",owner:"Charlie",project:"",desc:"Possible Attrition - XYZ",level:"High",impact:"Affects Project Delivery",mitigation:"KT/Documentation etc",mitDue:"",notes:"",_src:"",status:"Active",created:"2026-03-17",archived:false}],
salesPlays:[],
contracts:[{id:"ct1",name:"LinkedIn CGI FY26 CO2",owner:"Charlie",start:"2025-07-01",end:"2026-06-30",renewed:false,notes:""},
{id:"ct2",name:"LTS BI FY2025Q1 (Ileana) CO7",owner:"Charlie",start:"2025-02-21",end:"2026-02-20",renewed:false,notes:""},
{id:"ct3",name:"LinkedIn MIDA",owner:"Multiple",start:"2025-10-01",end:"2026-09-30",renewed:false,notes:""},
{id:"ct4",name:"Trust Project Sanket",owner:"Ankit",start:"2025-09-01",end:"2026-08-31",renewed:false,notes:""}],
recognitions:[{id:"rc1",date:"Feb",name:"VJ",from:"Client Feedback (Rajni and Kaylee)",ctx:"Incredible partner on Large Hire Learning Week campaigns."},
{id:"rc2",date:"Feb",name:"Dharmendra",from:"Client Feedback (Shruti)",ctx:"Outstanding leadership as Sr. Engineering Data Scientist."}]};

let data=null,tab="dash",exRec={},saveTimer=null,saving=false;

// ===== GOOGLE SHEETS SYNC =====
function toSheetFormat(){
  return {
    Ankit:data.people.Ankit.projects,
    Charlie:data.people.Charlie.projects,
    Ryan:data.people.Ryan.projects,
    Risks:data.riskTracker.map(r=>({...r,archived:r.archived?"TRUE":"FALSE"})),
    Sales:data.salesPlays.map(s=>({...s,archived:s.archived?"TRUE":"FALSE"})),
    Contracts:data.contracts.map(c=>({...c,renewed:c.renewed?"TRUE":"FALSE"})),
    Recognitions:data.recognitions
  };
}

function fromSheetFormat(d){
  // Normalize ISO timestamps (2026-03-18T06:00:00.000Z) to YYYY-MM-DD
  function fixDate(v){
    if(!v||v==="")return "";
    v=String(v);
    if(v.includes("T"))return v.slice(0,10);
    if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
    // Try to parse other formats
    var dt=new Date(v);
    if(!isNaN(dt))return dt.toISOString().slice(0,10);
    return v;
  }
  var PROJ_DATES=["upd","mitDue"];
  var RISK_DATES=["mitDue"];
  var SALES_DATES=["lastUpd"];
  var CTR_DATES=["start","end"];

  var out={people:{Ankit:{projects:[]},Charlie:{projects:[]},Ryan:{projects:[]}},riskTracker:[],salesPlays:[],contracts:[],recognitions:[]};
  PPL.forEach(p=>{
    if(d[p]&&d[p].length){
      out.people[p].projects=d[p].map(r=>{
        NUM_FIELDS.forEach(f=>{r[f]=Number(r[f])||0;});
        PROJ_DATES.forEach(f=>{r[f]=fixDate(r[f]);});
        if(!r.id)r.id=uid();
        return r;
      });
    }
  });
  if(d.Risks)out.riskTracker=d.Risks.map(r=>{if(!r.id)r.id=uid();RISK_DATES.forEach(f=>{r[f]=fixDate(r[f]);});r.created=fixDate(r.created);r.archived=(r.archived==="TRUE"||r.archived===true);if(!r.status)r.status="Active";return r;});
  if(d.Sales)out.salesPlays=d.Sales.map(r=>{if(!r.id)r.id=uid();SALES_DATES.forEach(f=>{r[f]=fixDate(r[f]);});r.created=fixDate(r.created);r.archived=(r.archived==="TRUE"||r.archived===true);if(!r.status)r.status="New";return r;});
  if(d.Contracts)out.contracts=d.Contracts.map(r=>{if(!r.id)r.id=uid();r.renewed=(r.renewed==="TRUE"||r.renewed===true);CTR_DATES.forEach(f=>{r[f]=fixDate(r[f]);});return r;});
  if(d.Recognitions)out.recognitions=d.Recognitions.map(r=>{if(!r.id)r.id=uid();return r;});
  return out;
}

async function loadFromSheet(){
  try{
    const r=await fetch(API+"?action=read");
    const d=await r.json();
    if(d.error){throw new Error(d.error);}
    // Check if sheet has data
    const hasData=PPL.some(p=>d[p]&&d[p].length);
    if(hasData){
      data=fromSheetFormat(d);
    } else {
      // First time: seed with defaults
      data=JSON.parse(JSON.stringify(DD));
      await saveToSheet();
    }
    syncRisks();syncSales();
    render();
    showToast("sync");
  }catch(e){
    console.error("Load failed:",e);
    // Fallback to localStorage
    try{const s=localStorage.getItem("pulse-v8");if(s)data=JSON.parse(s);}catch(e2){}
    if(!data)data=JSON.parse(JSON.stringify(DD));
    syncRisks();syncSales();
    render();
  }
}

async function saveToSheet(){
  saving=true;
  try{
    // Also save to localStorage as backup
    try{localStorage.setItem("pulse-v8",JSON.stringify(data));}catch(e){}
    const r=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"save",data:toSheetFormat()})});
    const d=await r.json();
    if(d.status==="saved"){showToast("save");}
    else{showToast("err");}
  }catch(e){
    console.error("Save failed:",e);
    showToast("err");
  }
  saving=false;
}

// Debounced save - waits 1.5s after last change before saving
function queueSave(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{saveToSheet();},1500);
}

function showToast(type){
  const el=document.getElementById("toast-"+type);
  if(!el)return;
  el.classList.add("on");
  setTimeout(()=>el.classList.remove("on"),1500);
}

// ===== HELPERS =====
const uid=()=>Math.random().toString(36).slice(2,8);
const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const scc=v=>v>=2.8?"var(--grn)":v>=2?"var(--yel)":"var(--red)";
const scr=v=>v>=2.8?"#059669":v>=2?"#d97706":"#dc2626";
const scbg=v=>v>=2.8?"var(--grn-bg)":v>=2?"var(--yel-bg)":"var(--red-bg)";
const av=(a,f)=>a.length?a.reduce((s,p)=>s+(p[f]||0),0)/a.length:0;
const today=()=>new Date().toISOString().slice(0,10);
const daysBetween=(a,b)=>Math.ceil((new Date(b)-new Date(a))/(1000*60*60*24));

function allP(){const r=[];PPL.forEach(p=>data.people[p].projects.forEach(pr=>r.push({...pr,owner:p})));return r;}

function syncRisks(){
  PPL.forEach(who=>{data.people[who].projects.forEach(p=>{
    if(!p.risks||!p.risks.trim())return;
    const srcKey=who+"|"+p.id;
    let ex=data.riskTracker.find(r=>r._src===srcKey);
    if(!ex){data.riskTracker.push({id:uid(),owner:who,project:p.name,desc:p.risks,status:"Active",level:"Medium",impact:"",mitigation:p.mit||"",mitDue:p.mitDue||"",notes:"",_src:srcKey,created:today(),archived:false});}
    else{ex.desc=p.risks;ex.project=p.name;ex.mitigation=p.mit||ex.mitigation;ex.mitDue=p.mitDue||ex.mitDue;}
  });});
}
function syncSales(){
  PPL.forEach(who=>{data.people[who].projects.forEach(p=>{
    if(!p.sales||!p.sales.trim())return;
    const srcKey=who+"|"+p.id+"|sales";
    let ex=data.salesPlays.find(s=>s._src===srcKey);
    if(!ex){data.salesPlays.push({id:uid(),owner:who,project:p.name,opp:p.sales,desc:"",status:"New",next:"",notes:"",lastUpd:p.upd||today(),_src:srcKey,created:today(),archived:false});}
    else{ex.opp=p.sales;ex.project=p.name;ex.lastUpd=p.upd||today();}
  });});
}
function syncMitBack(who,idx){
  const p=data.people[who].projects[idx];
  const rt=data.riskTracker.find(r=>r._src===who+"|"+p.id);
  if(rt){rt.mitigation=p.mit||"";rt.mitDue=p.mitDue||"";}
}

function ctrUrgency(c){
  if(c.renewed)return{color:"#059669",icon:"✅",cls:"alert-blue",label:"Renewed",days:999};
  const days=daysBetween(today(),c.end);
  if(days<0)return{color:"#dc2626",icon:"⛔",cls:"alert-red",label:"Expired",days};
  if(days<=30)return{color:"#dc2626",icon:"🔴",cls:"alert-red",label:"Critical",days};
  if(days<=60)return{color:"#ea580c",icon:"🟠",cls:"alert-orange",label:"Urgent",days};
  if(days<=90)return{color:"#d97706",icon:"🟡",cls:"alert-yellow",label:"Attention",days};
  return{color:"#059669",icon:"🟢",cls:"alert-blue",label:"On Track",days};
}

function setTab(t){tab=t;render();}

// ===== RENDER =====
function render(){
if(!data)return;
const ap=document.getElementById("app");
const wk=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
let h=`<div class="hdr"><h1>LinkedIn <span>Delivery Pulse Check</span> 2026</h1><div class="hdr-r"><button class="sync-btn" onclick="loadFromSheet()">↻ Refresh</button><span class="wk">Week of ${wk}</span></div></div>`;

const tabs=[{id:"dash",l:"◉ Dashboard"},{id:"sales",l:"$ Sales Plays"},{id:"risks",l:"⚠ Risk Tracker"},
{id:"Ankit",l:"Ankit",p:1},{id:"Charlie",l:"Charlie",p:1},{id:"Ryan",l:"Ryan",p:1},{id:"rec",l:"★ Recognition"},{id:"contracts",l:"📋 Contracts"}];
h+=`<div class="tabs">${tabs.map(t=>`<button class="tab${tab===t.id?" on":""}${t.p?" p":""}" onclick="setTab('${t.id}')">${t.l}</button>`).join("")}</div>`;

if(tab==="dash")h+=renderDash();
else if(tab==="sales")h+=renderSales();
else if(tab==="risks")h+=renderRisks();
else if(tab==="contracts")h+=renderContracts();
else if(tab==="rec")h+=renderRec();
else if(PPL.includes(tab))h+=renderPerson(tab);

ap.innerHTML=h;
}

function renderDash(){
const ap2=allP(),avgs=HF.map(f=>av(ap2,f)),ov=avgs.reduce((a,b)=>a+b,0)/avgs.length;

});h+=`</div>`;}
h+=`<div class="grid4">`;
[["Account Health",ov.toFixed(2),scr(ov),`of 3.00 · ${ap2.length} projects`],["Projects",ap2.length,"#2563eb","across 3 leads"],["Active Risks",tR,"#dc2626",`${rc.High}H · ${rc.Medium}M · ${rc.Low}L`],["Sales Opps",data.salesPlays.length,"#059669","tracked"]].forEach(([l,v,c,s])=>{
h+=`<div class="card"><div class="sl">${l}</div><div class="sv" style="color:${c}">${v}</div><div class="ss">${s}</div></div>`;});

["High","Medium","Low"].forEach(l=>{const cnt=rc[l]||0;const col=l==="High"?"#dc2626":l==="Medium"?"#d97706":"#059669";const pct=tR?Math.max(cnt/tR*100,cnt?8:0):0;

function renderContracts(){
const sorted=[...data.contracts].sort((a,b)=>{if(a.renewed&&!b.renewed)return 1;if(!a.renewed&&b.renewed)return -1;return daysBetween(today(),a.end)-daysBetween(today(),b.end);});
let h=`<div class="card"><div class="ct"><span class="dot" style="background:var(--acc)"></span>Contract Tracker</div>`;
h+=`<div style="font-size:11px;color:var(--dim);margin-bottom:10px">Alerts appear on Dashboard when contracts are within 90 days of expiration.</div>`;
h+=`<div style="overflow-x:auto"><table><thead><tr><th style="width:30px"></th><th>Contract Name</th><th>Owner</th><th>Start Date</th><th>End Date</th><th style="text-align:center">Days Left</th><th style="min-width:80px">Progress</th><th>Notes</th><th style="text-align:center">Renewed</th><th></th></tr></thead><tbody>`;
sorted.forEach(c=>{
const i=data.contracts.findIndex(x=>x.id===c.id);const u=ctrUrgency(c);
const days=c.renewed?null:daysBetween(today(),c.end);
const totalDays=daysBetween(c.start,c.end);const elapsed=daysBetween(c.start,today());
const pct=Math.min(Math.max(elapsed/totalDays*100,0),100);
const daysText=c.renewed?"—":days<0?Math.abs(days)+" past":days===0?"Today!":days+"d";
h+=`<tr><td style="text-align:center;font-size:15px">${c.renewed?"✅":u.icon}</td>`;
h+=`<td><input class="ei" value="${esc(c.name)}" onchange="uCtr(${i},'name',this.value)" style="min-width:160px;font-weight:600"></td>`;
h+=`<td><input class="ei" value="${esc(c.owner)}" onchange="uCtr(${i},'owner',this.value)" style="min-width:80px"></td>`;
h+=`<td><input type="date" class="date-in" value="${esc(c.start)}" onchange="uCtr(${i},'start',this.value)"></td>`;
h+=`<td><input type="date" class="date-in" value="${esc(c.end)}" onchange="uCtr(${i},'end',this.value)"></td>`;
h+=`<td style="text-align:center;font-weight:700;color:${c.renewed?"var(--grn)":u.color};white-space:nowrap">${daysText}</td>`;
h+=`<td><div class="ctr-bar"><div class="ctr-bar-fill" style="width:${pct}%;background:${u.color}"></div></div></td>`;
h+=`<td><textarea class="ei" onchange="uCtr(${i},'notes',this.value)" style="min-width:100px">${esc(c.notes)}</textarea></td>`;
h+=`<td style="text-align:center"><button onclick="toggleRenew(${i})" class="ctr-renew" style="background:${c.renewed?"var(--grn-bg)":"var(--sf2)"};color:${c.renewed?"var(--grn)":"var(--dim)"};border:1px solid ${c.renewed?"#a7f3d0":"var(--bd)"}">${c.renewed?"✓ Yes":"No"}</button></td>`;
h+=`<td><button class="del-btn" onclick="rCtr(${i})">✕</button></td></tr>`;});
h+=`</tbody></table></div><button class="add-btn" onclick="aCtr()">+ Add Contract</button></div>`;
return h;
}

function renderRec(){
let h="";
data.recognitions.forEach((r,i)=>{const exp=exRec[i];
h+=`<div class="rec-card"><div class="rec-stripe" style="background:var(--yel)"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><div style="font-weight:700;font-size:14px">★ ${esc(r.name)}</div><div style="font-size:11px;color:var(--dim)">${esc(r.from)}</div></div><div style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:var(--dim);background:var(--sf2);padding:3px 8px;border-radius:12px">${esc(r.date)}</span><button class="del-btn" onclick="rRec(${i})">✕</button></div></div>`;
h+=`<div style="font-size:12px;color:var(--dim);line-height:1.5;max-height:${exp?"none":"60px"};overflow:hidden">${esc(r.ctx)}</div>`;
if((r.ctx||"").length>80)h+=`<button style="background:none;border:none;color:var(--acc);font-size:11px;cursor:pointer;margin-top:3px" onclick="exRec[${i}]=!exRec[${i}];render();">${exp?"Less":"More..."}</button>`;
h+=`</div>`;});
h+=`<div class="card"><div class="ct">Add Recognition</div><div style="display:grid;grid-template-columns:90px 130px 1fr;gap:8px"><input class="ei" id="rd" placeholder="Month" style="border:1px solid var(--bd);background:var(--sf2)"><input class="ei" id="rn" placeholder="Name" style="border:1px solid var(--bd);background:var(--sf2)"><input class="ei" id="rf" placeholder="From" style="border:1px solid var(--bd);background:var(--sf2)"></div><textarea class="ei" id="rc" placeholder="Context..." style="border:1px solid var(--bd);background:var(--sf2);margin-top:6px;min-height:50px"></textarea><button class="add-btn" onclick="addRec()">+ Add</button></div>`;
return h;
}

// ===== MUTATIONS =====
function mut(){syncRisks();syncSales();queueSave();}

function uP(who,i,f,v){data.people[who].projects[i][f]=v;if(f!=="upd")data.people[who].projects[i].upd=today();
if(f==="risks"||f==="mit"||f==="mitDue"||f==="name"){syncMitBack(who,i);}
mut();if(HF.includes(f))render();}
function aP(who){data.people[who].projects.push({id:uid(),name:"New Project",lp:"",dl:"",contracts:3,financials:3,delivery:3,blendTeam:3,clientSat:3,engagement:3,upd:today(),hot:"",risks:"",mit:"",mitDue:"",sales:"",notes:""});mut();render();}
function rP(who,i){if(!confirm("Remove this project?"))return;data.people[who].projects.splice(i,1);mut();render();}

function uR(i,f,v){data.riskTracker[i][f]=v;queueSave();}
function aR(){data.riskTracker.push({id:uid(),owner:"",project:"",desc:"",status:"Identified",level:"Medium",impact:"",mitigation:"",mitDue:"",notes:"",_src:"",created:today(),archived:false});mut();render();}
function rR(i){if(!confirm("Remove?"))return;data.riskTracker.splice(i,1);mut();render();}
function archR(i){data.riskTracker[i].archived=true;mut();render();}
function unarchR(i){data.riskTracker[i].archived=false;mut();render();}
window._showArchRisks=false;
function toggleArchRisks(){window._showArchRisks=!window._showArchRisks;render();}

function uSP(i,f,v){data.salesPlays[i][f]=v;data.salesPlays[i].lastUpd=today();queueSave();}
function aSP(){data.salesPlays.push({id:uid(),owner:"",project:"",opp:"",desc:"",status:"New",next:"",notes:"",lastUpd:today(),_src:"",created:today(),archived:false});mut();render();}
function rSP(i){if(!confirm("Remove?"))return;data.salesPlays.splice(i,1);mut();render();}
function archSP(i){data.salesPlays[i].archived=true;mut();render();}
function unarchSP(i){data.salesPlays[i].archived=false;mut();render();}
window._showArchSales=false;
function toggleArchSales(){window._showArchSales=!window._showArchSales;render();}

function uCtr(i,f,v){data.contracts[i][f]=v;queueSave();}
function aCtr(){data.contracts.push({id:uid(),name:"New Contract",owner:"",start:today(),end:"",renewed:false,notes:""});mut();render();}
function rCtr(i){if(!confirm("Remove?"))return;data.contracts.splice(i,1);mut();render();}
function toggleRenew(i){data.contracts[i].renewed=!data.contracts[i].renewed;mut();render();}

function addRec(){const d=document.getElementById("rd").value,n=document.getElementById("rn").value,f=document.getElementById("rf").value,c=document.getElementById("rc").value;if(!n||!c)return alert("Name & context required");data.recognitions.unshift({id:uid(),date:d,name:n,from:f,ctx:c});mut();render();}
function rRec(i){if(!confirm("Remove?"))return;data.recognitions.splice(i,1);mut();render();}

// ===== INIT =====
loadFromSheet();
// Auto-refresh every 30 seconds to pick up other people's changes
setInterval(()=>{if(!saving)loadFromSheet();},30000);
</script>
